# Production stack on a single VPS. Pulls images from GHCR after they're
# built+pushed by CI. The api service uses two replicas behind Caddy for
# zero-downtime deploys.
#
# Required env (in /etc/splitwise/.env on the host):
#   - DOMAIN, APP_DOMAIN, API_DOMAIN, ADMIN_EMAIL
#   - POSTGRES_PASSWORD
#   - All the variables from .env.example with prod values

name: splitwise

x-api-base: &api-base
  image: ${API_IMAGE:-ghcr.io/yourorg/splitwise-api:latest}
  restart: unless-stopped
  env_file: /etc/splitwise/.env
  environment:
    DATABASE_URL: "postgresql://splitwise:${POSTGRES_PASSWORD}@postgres:5432/splitwise?schema=public"
    REDIS_URL: "redis://redis:6379"
    NODE_ENV: production
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      API_DOMAIN: ${API_DOMAIN}
      APP_DOMAIN: ${APP_DOMAIN}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - web_dist:/srv/web:ro
    depends_on:
      - api

  api:
    <<: *api-base
    deploy:
      replicas: 2

  worker:
    image: ${WORKER_IMAGE:-ghcr.io/yourorg/splitwise-worker:latest}
    restart: unless-stopped
    env_file: /etc/splitwise/.env
    environment:
      DATABASE_URL: "postgresql://splitwise:${POSTGRES_PASSWORD}@postgres:5432/splitwise?schema=public"
      REDIS_URL: "redis://redis:6379"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: splitwise
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: splitwise
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U splitwise -d splitwise"]
      interval: 10s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - "256mb"
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  # Nightly pg_dump → Cloudflare R2 (or any S3-compatible bucket).
  # Runs a tiny cron loop; restart policy unless-stopped means it survives reboots.
  backup:
    image: alpine:3.20
    restart: unless-stopped
    env_file: /etc/splitwise/.env
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_CRON: "0 3 * * *"
    volumes:
      - ./scripts/backup.sh:/usr/local/bin/backup.sh:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache postgresql16-client age rclone tini ca-certificates >/dev/null
        echo "$$BACKUP_CRON /usr/local/bin/backup.sh" > /etc/crontabs/root
        echo "backup container ready (cron: $$BACKUP_CRON)"
        exec crond -f -L /dev/stdout
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
  redis_data:
  caddy_data:
  caddy_config:
  web_dist:
